<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhiwandi Mart</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="logo">
            <h1><img src="assets/logo.png" alt="Bhiwandi Mart Logo"> Bhiwandi Mart</h1>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search for products...">
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">Deals</a></li>
                <li><a href="#">My Account</a></li>
            </ul>
        </nav>
        <div class="icons">
            <a href="#" class="cart-icon">🛒</a>
            <a href="#" class="user-icon">👤</a>
        </div>
    </header>

    <!-- Main Banner Section -->
    <section class="banner">
        <div class="slider">
            <div class="slide">
                <img src="assets/banner1.jpg" alt="Refurbished Deals">
                <p>Big Discounts on Refurbished Items!</p>
            </div>
            <div class="slide">
                <img src="assets/banner2.jpg" alt="New Arrivals">
                <p>New Electronics Now in Stock!</p>
            </div>
        </div>
    </section>

    <!-- Category Selection -->
    <section class="category-selection">
        <div class="category-button">
            <button>Refurbished Items</button>
        </div>
        <div class="category-button">
            <button>New Items</button>
        </div>
    </section>

    <!-- Buttons for Contacting -->
    <section class="action-buttons">
        <div class="action-btn">
            <a href="https://wa.me/1234567890" target="_blank" class="whatsapp-btn">Join Our WhatsApp Community</a>
        </div>
        <div class="action-btn">
            <a href="https://example.com/contact-owner" target="_blank" class="contact-owner-btn">Contact the Owner</a>
        </div>
    </section>

    <!-- Footer Section -->
    <footer>
        <div class="footer-links">
            <ul>
                <li><a href="#">Privacy Policy</a></li>
                <li><a href="#">Terms of Service</a></li>
                <li><a href="#">Help Center</a></li>
            </ul>
        </div>
        <div class="social-icons">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
        </div>
    </footer>
</body>
</html>
